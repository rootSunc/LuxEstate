name: Bug report
description: Report a reproducible problem in LuxEstate.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Node 22, Chrome, macOS
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
